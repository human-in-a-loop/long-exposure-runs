package_name: "phytograph"
description: |
  PhytoGraph is a six-track plant-biology hypergraph campaign covering reticulation, ghost coevolutionary partners, convergence, domestication, chemodiversity, and botanical model-probe failures. This package contains the final synthesis, source references, selected reproducibility artifacts, track-local validation and closure records, and figures needed to verify the report's conservative conclusion: the substrate, instruments, Atlas integration, diagnostics, and reopen gates were built, but no biological prediction was promoted into the master ledgers.
curation_complete: true
include:
  - src: reports/final/final_report.md
    dest: report/final_report.md
    role: report
  - src: reports/final/final_report.pdf
    dest: report/final_report.pdf
    role: report
  - src: MANIFEST.md
    dest: report/MANIFEST.md
    role: report
  - src: REFERENCES.md
    dest: report/REFERENCES.md
    role: report
  - src: phytograph_schema.md
    dest: code/phytograph_schema.md
    role: code
    justification: "Final report section 'Substrate, Schema, And Evidence Boundaries' cites the shared typed-hypergraph schema and evidence-boundary rules."
  - src: data_source_audit.md
    dest: code/data_source_audit.md
    role: code
    justification: "Final report cites the source-role and provenance audit in the schema/source-audit summary."
  - src: coverage_report.md
    dest: code/coverage_report.md
    role: code
    justification: "Final report cites the coverage artifact in schema/source-audit and reproducibility sections."
  - src: scripts/barrier1_common.py
