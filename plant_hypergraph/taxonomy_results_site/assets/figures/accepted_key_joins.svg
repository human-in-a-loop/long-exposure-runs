<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430" role="img">
<defs>
<style><![CDATA[
text{font-family:Inter,Arial,sans-serif;fill:#17201b} .title{font-size:26px;font-weight:800}.label{font-size:15px;font-weight:700}.small{font-size:12px}.tiny{font-size:10px}.muted{fill:#5f6f67}.box{fill:#f7faf8;stroke:#b8c8bf;stroke-width:1.2}.green{fill:#dff2df;stroke:#6aa56a}.amber{fill:#fff1cf;stroke:#c28b23}.red{fill:#ffe0dd;stroke:#c75b4e}.blue{fill:#dfeefd;stroke:#5b89c7}.violet{fill:#eee4ff;stroke:#8b70bf}.gray{fill:#edf0ef;stroke:#8c9892}.line{stroke:#698075;stroke-width:2;fill:none}]]></style>
</defs>
<rect width="820" height="430" fill="#fbfdfb"/>
<text x="34" y="44" class="title">Accepted-name joins and blockers</text>
<rect x="58" y="104" width="162" height="130" rx="9" class="green"/>
<text x="74" y="135" class="label">Taxonomy substrate</text>
<text x="74" y="166" class="small">60,000 taxa indexed</text>
<text x="74" y="196" class="tiny">usable as review surface</text>
<path d="M220 170 L260 170" class="line"/>
<rect x="260" y="104" width="162" height="130" rx="9" class="amber"/>
<text x="276" y="135" class="label">Reticulation</text>
<text x="276" y="166" class="small">2 accepted-name projections</text>
<text x="276" y="196" class="tiny">sidecar signal uncontrolled</text>
<path d="M422 170 L462 170" class="line"/>
<rect x="462" y="104" width="162" height="130" rx="9" class="red"/>
<text x="478" y="135" class="label">Ghost interaction</text>
<text x="478" y="166" class="small">0 of 8 held-outs passed</text>
<text x="478" y="196" class="tiny">modern-failure support missing</text>
<path d="M624 170 L664 170" class="line"/>
<rect x="664" y="104" width="162" height="130" rx="9" class="gray"/>
<text x="680" y="135" class="label">Domestication</text>
<text x="680" y="166" class="small">0 comparator rows</text>
<text x="680" y="196" class="tiny">climate validation blocked</text>
<text x="52" y="316" class="label">Interpretation</text>
<text x="52" y="342" class="small muted">The site exposes accepted-name joins as evidence gates, not as hidden cleanup.</text>
<text x="52" y="365" class="small muted">When a join or control fails, the biological claim stays below promotion threshold.</text>
</svg>
