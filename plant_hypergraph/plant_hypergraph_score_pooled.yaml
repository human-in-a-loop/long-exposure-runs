  name: Continuous Exploration
  version: '1.0'
  mode: continuous
seed:
  starting_subtopic: null
  starting_tools: null
citations: "<citations>\nWhen referencing external sources (papers, datasets, standards,\nweb pages), use numbered brackets [1], [2], etc. Read REFERENCES.md\nat the start of your turn to continue the numbering and avoid\nduplicates. Add new references to REFERENCES.md using the format:\n  [N] Authors, \"Title,\" Source, Year. URL (if applicable).\nIf REFERENCES.md does not exist, create it with your first reference.\n</citations>\n"
loop:
  max_cycles: null
  cycle_cooldown_seconds: 400
  report_interval: 3
  daily_sync_interval_hours: 24
  min_clone_cycles_before_preempt: 1
  barrier_preempt_timeout_seconds: 3600
