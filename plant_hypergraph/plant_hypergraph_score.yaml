task: "# Long-Exposure Research Prompt: Plant Taxonomy as Hypergraph Structure\n\n\
  ## Campaign Title\n\n**Hypergraph Representations for Noisy Plant Taxonomy, Reticulate\
  \ Evolution, and Hierarchy-Aware Biological Classification**\n\n## Mission\n\nRun\
  \ a long-exposure research campaign on the following question:\n\n> Can plant taxonomic\
  \ hierarchy, synonymy, trait similarity, geography, and reticulate evolutionary\
  \ signals be represented as a hypergraph in a way that produces a measurable advantage\
  \ over tree, DAG, ordinary graph, or flat-classification baselines?\n\nThe target\
  \ is not a literature review. The target is a research artifact that could plausibly\
  \ help a computational biology, biodiversity informatics, or machine-learning researcher\
  \ decide whether hypergraph modeling is worth pursuing for plant classification\
  \ and taxonomic conflict analysis.\n\nThe campaign should produce at least one of:\n\
  \n- a reproducible benchmark,\n- a new hierarchy-aware error metric,\n- a falsifiable\
  \ hypergraph formulation,\n- a useful negative result,\n- a small public-data-backed\
  \ prototype,\n- a theorem-quality diagnostic or counterexample,\n- a curated data\
  \ transformation that makes later work easier.\n\n## Scientific Motivation\n\nPlant\
  \ taxonomy is hierarchical, but it is not cleanly tree-like in practice. A working\
  \ plant data system must handle accepted names, synonyms, unresolved names, hybrids,\
  \ cultivars, missing intermediate ranks, disputed circumscriptions, regional checklist\
  \ disagreements, and label noise across specimen records. Phylogeny, nomenclature,\
  \ taxonomic rank, morphology, ecology, geography, and occurrence data are related\
  \ but distinct evidence layers.\n\nA hypergraph may be useful because many relevant\
  \ biological relationships are naturally multi-way rather than pairwise:\n\n- a\
  \ synonym cluster links several names to one accepted taxon;\n- a trait syndrome\
  \ links many taxa, traits, habitats, and climates;\n- a specimen provenance record\
  \ links taxon, collector, herbarium, location, date, and determination history;\n\
  - a reticulate or hybridization event may relate multiple parental or source lineages;\n\
  - a regional checklist conflict may link source, geography, accepted name, synonym,\
  \ and rank;\n- a molecular-marker or phylogenetic support set may link several taxa\
  \ through a shared evidence source.\n\nThe campaign should test whether representing\
  \ these relationships as hyperedges improves any concrete task, or whether ordinary\
  \ tree/DAG/graph baselines already capture the useful signal.\n\n## Core Research\
  \ Questions\n\n1. **Representation:** What is the cleanest hypergraph formulation\
  \ for plant taxonomy that does not confuse taxonomy, phylogeny, nomenclature, trait\
  \ similarity, and occurrence evidence?\n2. **Prediction:** Does a hypergraph improve\
  \ hierarchy-consistent classification or label completion relative to tree/DAG,\
  \ ordinary graph, and flat baselines?\n3. **Reticulation:** Can synthetic or public-data-backed\
  \ reticulate cases expose a genuine weakness of strict tree models?\n4. **Metrics:**\
  \ Can we define a hierarchy-aware error metric that handles non-tree structure,\
  \ synonyms, missing ranks, and near-miss biological errors?\n5. **Falsification:**\
  \ Under what conditions is the hypergraph misleading, redundant, or just memorizing\
  \ label frequency and taxonomy depth?\n\n## Required Conceptual Distinctions\n\n\
  Do not collapse these layers:\n\n- **Taxonomy:** a managed classification with ranks,\
  \ accepted names, synonyms, and circumscriptions.\n- **Phylogeny:** inferred evolutionary\
  \ relationship, usually tree-like but sometimes uncertain or network-like.\n- **Nomenclature:**\
  \ rules and records for scientific names, authorship, synonyms, and name status.\n\
  - **Trait similarity:** morphological, ecological, physiological, or phenological\
  \ resemblance.\n- **Occurrence evidence:** specimen or observation records with\
  \ geography, date, source, and data-quality flags.\n- **Dataset label hierarchy:**\
  \ the label structure available in a specific training set, which may be incomplete\
  \ or inconsistent.\n\nClaims about biological novelty must be avoided unless supported\
  \ by authoritative taxonomic or phylogenetic sources. The safe target is modeling,\
  \ diagnostics, and benchmark construction.\n\n## Data Sources To Investigate\n\n\
  Use current official documentation where possible, and record access date, license,\
  \ limitations, and citation requirements.\n\n### Primary Candidate Sources\n\n-\
  \ **World Flora Online / WFO Plant List**\n  - Use for accepted plant names, synonyms,\
  \ taxonomic backbone snapshots, and WFO identifiers.\n  - Investigate REST, GraphQL,\
  \ and downloadable backbone snapshots.\n  - Strong candidate for a canonical taxonomy/synonym\
  \ layer.\n  - Expected access: should be usable without an account for ordinary\
  \ REST/GraphQL queries and public snapshot downloads. Record exact endpoint, release\
  \ version, and access date.\n\n- **GBIF**\n  - Use for taxon backbone lookup, occurrence\
  \ records, accepted taxon keys, synonym matching, and occurrence-derived noise cases.\n\
  \  - Use the species API for small interactive pulls.\n  - Use occurrence search\
  \ for small samples.\n  - Use async downloads only if the campaign needs a larger\
  \ reproducible occurrence dataset and credentials are available.\n  - Expected access:\
  \ most read/search API usage should work without authentication. Authentication\
  \ is expected for async occurrence download requests and some write or account-linked\
  \ operations. Avoid making bulk occurrence retrieval depend on credentials unless\
  \ credentials are explicitly available.\n\n- **Open Tree of Life**\n  - Use for\
  \ taxonomy/phylogeny comparison, name resolution, OTT IDs, and synthetic tree extraction.\n\
  \  - Treat Open Tree as phylogenetic/taxonomic synthesis evidence, not as identical\
  \ to WFO or GBIF taxonomy.\n  - Expected access: ordinary web-service reads, name\
  \ resolution, and tree/taxonomy queries should be public and not account-blocking.\n\
  \n- **BIEN / RBIEN**\n  - Use for plant traits, ranges, phylogenies, species lists,\
  \ and occurrence data where accessible.\n  - R tooling may be the easiest route.\n\
  \  - Expected access: likely not account-blocking for normal package-mediated access,\
  \ but may require local R package setup. Treat as useful but not mandatory for the\
  \ first pass.\n\n- **TRY Plant Trait Database**\n  - Investigate trait availability\
  \ and access constraints.\n  - Use only if access and licensing permit reproducible\
  \ use.\n  - Expected access: most likely source to require registration, terms,\
  \ or manual data acquisition. Treat as optional unless access is already available.\
  \ Do not block the campaign on TRY.\n\n### Fallback Data Strategy\n\nIf public data\
  \ access is too limited or too messy for a first prototype, build a synthetic benchmark\
  \ that explicitly models:\n\n- accepted taxa and synonym clusters,\n- missing intermediate\
  \ ranks,\n- renamed taxa,\n- trait convergence,\n- noisy occurrence labels,\n- hybrid\
  \ or reticulate relationships,\n- family/genus/species hierarchy,\n- conflict between\
  \ taxonomic and trait similarity.\n\nSynthetic results must be clearly marked as\
  \ synthetic. The final report should state exactly which biological claims remain\
  \ unsupported.\n\n## Local Tooling Guidance\n\nTooling comment for the runner: this\
  \ campaign should not be blocked on heavyweight local infrastructure. The first\
  \ research pass can use WebFetch/API calls for documentation, WFO name lookups,\
  \ GBIF species/taxon matching, small GBIF occurrence samples, and Open Tree name/tree\
  \ queries. Local tools become important for reproducibility, repeated experiments,\
  \ frozen data snapshots, larger joins, statistical baselines, and tests. Wolfram\
  \ is optional and should be reserved for exact finite examples or symbolic derivations;\
  \ it is not required for plant database access.\n\nThe first pass should be feasible\
  \ with web/API access plus ordinary local scripting. Heavy local infrastructure\
  \ is not required.\n\nAccount/authentication guidance:\n\n- WFO Plant List should\
  \ not require an account for ordinary API queries or public snapshot access.\n-\
  \ GBIF small read/search API calls should not require authentication. GBIF async\
  \ occurrence downloads require a GBIF account and HTTP Basic authentication; use\
  \ them only if credentials are available.\n- Open Tree of Life read APIs should\
  \ not require authentication for ordinary use.\n- BIEN/RBIEN is a local setup issue\
  \ more than an account issue for normal use.\n- TRY is the main likely access bottleneck;\
  \ treat it as optional and replace it with WFO/GBIF/Open Tree plus synthetic traits\
  \ if needed.\n- The no-auth fallback path is: WFO taxonomy/synonyms + GBIF small\
  \ taxon/occurrence samples + Open Tree name/tree queries + synthetic reticulation/trait\
  \ benchmark.\n\nRecommended local stack:\n\n- Python 3.11+ or 3.12+\n- `pandas`,\
  \ `numpy`, `scipy`\n- `networkx`\n- `scikit-learn`\n- `requests` or `httpx`\n- `pyarrow`\
  \ for larger tabular files\n- `pytest`\n- `matplotlib` or `seaborn`\n- optional:\
  \ `hypernetx` or `xgi` for hypergraph utilities\n- optional: `torch` plus `torch-geometric`\
  \ or a minimal custom hypergraph propagation implementation\n- optional: R with\
  \ `rgbif`, `RBIEN`, and `WorldFlora` packages for biodiversity-specific access\n\
  - optional: Wolfram for symbolic derivations, finite counterexamples, exact small\
  \ hypergraph calculations, or theorem-template checks\n\nDo not require Wolfram\
  \ unless the campaign chooses a mathematical/theorem-heavy path. Python is sufficient\
  \ for the data and prototype portions. Wolfram is useful for exact finite examples,\
  \ symbolic hypergraph Laplacian calculations, or deriving a small counterexample,\
  \ but it is not necessary for pulling plant data.\n\nWeb/API access should be enough\
  \ for:\n\n- small WFO name/synonym pulls,\n- GBIF taxon matching and small occurrence\
  \ samples,\n- Open Tree name resolution and tree/taxonomy queries,\n- documentation\
  \ and literature mapping.\n\nLocal downloads are needed if:\n\n- the run needs a\
  \ frozen reproducible WFO backbone snapshot,\n- GBIF occurrence volume exceeds ordinary\
  \ API paging,\n- trait data must be joined at scale,\n- experiments need repeated\
  \ offline replay,\n- rate limits or auth requirements block API-only access.\n\n\
  ## Phase Plan\n\n### Phase 1: Problem Formalization\n\nDefine at least three representation\
  \ baselines:\n\n1. **Tree/DAG baseline:** taxonomic parent-child hierarchy only.\n\
  2. **Ordinary graph baseline:** pairwise relationships such as parent-child, synonym-of,\
  \ trait-similar-to, co-occurs-with.\n3. **Hypergraph model:** multi-way hyperedges\
  \ over taxa, names, traits, ranks, sources, occurrences, regions, and reticulation\
  \ events.\n\nDefine the hypergraph formally:\n\n- node types,\n- hyperedge types,\n\
  - incidence matrix,\n- edge weights,\n- label space,\n- hierarchy constraints,\n\
  - allowed evidence sources,\n- leakage controls.\n\nAt minimum, include these hyperedge\
  \ families:\n\n- `taxonomic_parentage`\n- `synonym_cluster`\n- `trait_syndrome`\n\
  - `regional_checklist_context`\n- `occurrence_provenance`\n- `reticulate_or_hybrid_signal`\n\
  - `missing_rank_bridge`\n\nState what each hyperedge is allowed to prove. For example,\
  \ a synonym cluster can support name normalization, but not phylogenetic closeness\
  \ by itself.\n\n### Phase 2: Literature And Data Map\n\nSurvey current work in:\n\
  \n- hypergraph learning,\n- hierarchical multi-label classification,\n- biological\
  \ knowledge graphs,\n- plant taxonomy databases,\n- phylogenetic networks and reticulate\
  \ evolution,\n- hierarchy-aware error metrics,\n- biodiversity data cleaning and\
  \ taxonomic name resolution.\n\nFor each relevant source, record:\n\n- citation,\n\
  - claim,\n- dataset or method,\n- what it supports for this campaign,\n- what it\
  \ does not support.\n\nThe output should include a data feasibility table with at\
  \ least five sources and a recommended minimal data path for the prototype.\n\n\
  ### Phase 3: Reticulate Evolution Benchmark\n\nDevelop a benchmark that tests the\
  \ sharper hypothesis:\n\n> Tree/DAG models should fail, or at least lose information,\
  \ when the correct label structure contains reticulate or hybrid-like relationships\
  \ that cannot be represented as single-parent hierarchy without distortion.\n\n\
  This can be public-data-backed, synthetic, or hybrid.\n\nRequired benchmark components:\n\
  \n- a strict hierarchy subset where the tree/DAG baseline should perform well;\n\
  - a reticulate subset where taxa can inherit or share evidence from multiple lineages;\n\
  - trait convergence cases where hyperedges might create false positives;\n- renamed/synonym\
  \ cases where name normalization matters more than evolutionary structure;\n- missing-rank\
  \ cases where family/genus/species labels are incomplete.\n\nCandidate tasks:\n\n\
  - hierarchy-consistent label completion,\n- genus/species placement from partial\
  \ trait and occurrence evidence,\n- synonym/conflict detection,\n- reticulate-case\
  \ anomaly detection,\n- taxon placement under missing intermediate ranks.\n\nNegative\
  \ controls:\n\n- a purely tree-generated dataset where the tree/DAG baseline should\
  \ match or beat the hypergraph;\n- random trait hyperedges that should not improve\
  \ performance;\n- label-frequency-only baseline;\n- taxonomy-depth-only baseline.\n\
  \n### Phase 4: Hierarchy-Aware Error Metrics\n\nDevelop and test at least one metric\
  \ that is more informative than flat accuracy.\n\nThe metric should distinguish:\n\
  \n- wrong species but right genus,\n- wrong genus but right family,\n- right accepted\
  \ taxon but synonym label,\n- right clade but wrong rank,\n- missing intermediate\
  \ rank,\n- plausible reticulate/hybrid placement,\n- trait-convergent but taxonomically\
  \ distant false positive,\n- geographically implausible occurrence label.\n\nCandidate\
  \ metrics:\n\n#### 1. Hierarchical Distance Error\n\nDistance between predicted\
  \ and target taxa in the accepted taxonomy tree or DAG, with penalties adjusted\
  \ by rank.\n\n#### 2. Synonym-Normalized Error\n\nZero or reduced penalty when prediction\
  \ and target collapse to the same accepted taxon under WFO or GBIF synonym resolution.\n\
  \n#### 3. Hypergraph Conflict Energy\n\nA prediction receives penalty when it violates\
  \ high-confidence hyperedge evidence:\n\n```text\nE(prediction) =\n  taxonomy_violation\n\
  \  + synonym_violation\n  + trait_incompatibility\n  + geography_incompatibility\n\
  \  + source_conflict\n  + reticulation_misfit\n```\n\nEach term must be explicitly\
  \ defined and ablated.\n\n#### 4. Reticulate Near-Miss Score\n\nA prediction receives\
  \ partial credit if it lands in a documented parent/source lineage or hybrid-related\
  \ neighborhood, but not if the same closeness is explained only by noisy trait convergence.\n\
  \n#### 5. Hierarchy-Coherence Violation Rate\n\nFor multi-rank predictions, count\
  \ predictions whose species/genus/family labels cannot coexist in the same accepted\
  \ hierarchy after synonym normalization.\n\nThe campaign should implement at least\
  \ one metric and test whether it changes conclusions compared with flat accuracy.\n\
  \n### Phase 5: Minimal Prototype\n\nBuild a small, reproducible prototype. Prefer\
  \ a narrow dataset over a broad but unreliable one.\n\nMinimum implementation:\n\
  \n- data ingestion script or synthetic benchmark generator;\n- frozen small dataset\
  \ artifact;\n- tree/DAG baseline;\n- ordinary graph baseline or flat classifier;\n\
  - hypergraph method;\n- hierarchy-aware metric;\n- tests for data normalization\
  \ and metric behavior;\n- reproducibility instructions.\n\nAcceptable hypergraph\
  \ methods:\n\n- incidence-matrix label propagation,\n- clique expansion with explicit\
  \ warning that this weakens hyperedge semantics,\n- hypergraph Laplacian smoothing,\n\
  - simple hyperedge scoring/ranking,\n- shallow hypergraph neural network,\n- rule-based\
  \ conflict energy over hyperedges.\n\nDo not overbuild the model. The first contribution\
  \ can be a benchmark and diagnostic metric rather than a state-of-the-art classifier.\n\
  \n### Phase 6: Stress Tests And Falsification\n\nRun ablations:\n\n- remove synonym\
  \ hyperedges;\n- remove trait hyperedges;\n- remove occurrence/geography hyperedges;\n\
  - randomize trait hyperedges;\n- randomize accepted-name mappings;\n- collapse hyperedges\
  \ to pairwise edges;\n- vary noise in trait convergence;\n- vary missing-rank rate;\n\
  - vary reticulation/hybrid rate;\n- vary class imbalance and label frequency.\n\n\
  Explicitly test these failure modes:\n\n- hypergraph gains vanish under fair graph\
  \ baseline;\n- hypergraph only memorizes family/genus depth;\n- trait hyperedges\
  \ cause false biological closeness;\n- synonym normalization accounts for all apparent\
  \ gains;\n- noisy occurrence records dominate the signal;\n- reticulate synthetic\
  \ cases are too artificial to support biological claims.\n\n### Phase 7: Mathematical\
  \ Or Algorithmic Contribution\n\nProduce at least one formal contribution.\n\nExamples:\n\
  \n1. **Counterexample:** a small hierarchy where flat accuracy improves while hierarchy-coherent\
  \ error worsens.\n2. **Sufficient condition:** a condition under which synonym hyperedges\
  \ reduce hierarchy-local error without increasing cross-family errors.\n3. **Hyperedge\
  \ usefulness diagnostic:** a statistic that predicts whether a hyperedge family\
  \ improves validation performance beyond a tree/DAG baseline.\n4. **Reticulation\
  \ obstruction:** a proof sketch showing why any single-parent tree encoding loses\
  \ information for a constructed hybrid-like benchmark.\n5. **Clique-expansion warning\
  \ theorem:** a small example where pairwise graph expansion of a hyperedge creates\
  \ false pairwise similarities not implied by the original multi-way relationship.\n\
  \nWolfram may be used here for exact finite examples, but the result should also\
  \ be described in ordinary mathematical prose.\n\n## Required Final Deliverables\n\
  \n1. `final_report.md`\n   - states the question,\n   - describes data and methods,\n\
  \   - reports results,\n   - separates validated, falsified, speculative, and data-limited\
  \ claims.\n\n2. `artifact_index.md`\n   - lists datasets, scripts, figures, tests,\
  \ and reports.\n\n3. `research_contribution_ledger.md`\n   - a terse ledger of exactly\
  \ what new artifact, metric, benchmark, theorem sketch, or negative result was produced.\n\
  \n4. `audit_report.md`\n   - missing evidence,\n   - failed hypotheses,\n   - known\
  \ data-quality risks,\n   - unsupported biological claims that were avoided,\n \
  \  - next experiments.\n\n5. Reproducible code\n   - data pull or generator,\n \
  \  - model/baseline code,\n   - metric code,\n   - tests,\n   - run instructions.\n\
  \n## Success Criteria\n\nThe campaign should be considered successful if it produces\
  \ one or more of the following:\n\n- a reusable plant taxonomy hypergraph benchmark;\n\
  - a hierarchy-aware metric that exposes failures hidden by flat accuracy;\n- evidence\
  \ that hypergraph structure improves a narrow task after fair baselines and ablations;\n\
  - evidence that hypergraph structure does not help once synonym normalization or\
  \ graph baselines are controlled;\n- a clear counterexample or theorem template\
  \ about tree/DAG limitations under reticulation;\n- a data-feasibility map that\
  \ prevents future researchers from confusing taxonomy, phylogeny, traits, and nomenclature.\n\
  \nThe campaign should not be considered successful merely because it writes a broad\
  \ survey or produces an attractive graph visualization.\n\n## Guardrails\n\n- Do\
  \ not claim new plant taxonomy, species relationships, or hybrid origins without\
  \ authoritative sources.\n- Do not scrape aggressively when APIs or downloads are\
  \ available.\n- Respect source licenses and citation requirements.\n- Keep public-data\
  \ experiments small and reproducible unless authenticated bulk downloads are available.\n\
  - Prefer explicit uncertainty and negative results over speculative biological interpretation.\n\
  - Treat WFO, GBIF, Open Tree, BIEN, and TRY as different evidence systems with different\
  \ purposes.\n- Record data access dates, API endpoints, package versions, and frozen\
  \ sample hashes.\n\n## Initial Hypotheses\n\nH1: Synonym-normalized hierarchy metrics\
  \ will change model rankings compared with flat accuracy.\n\nH2: Hypergraph models\
  \ will outperform tree/DAG baselines on synthetic reticulate and missing-rank cases,\
  \ but not necessarily on strict hierarchy cases.\n\nH3: Some apparent hypergraph\
  \ gains will vanish when synonym normalization and label-frequency baselines are\
  \ included.\n\nH4: Clique expansion will sometimes create false pairwise similarity\
  \ from multi-way evidence, motivating native hypergraph diagnostics.\n\nH5: The\
  \ most durable contribution may be a benchmark and metric rather than a predictive\
  \ model.\n\n## Suggested First Milestones\n\nM1. Data and literature feasibility\
  \ map.\n\nM2. Formal hypergraph schema and baseline definitions.\n\nM3. Synthetic\
  \ reticulate taxonomy benchmark generator.\n\nM4. Hierarchy-aware metric implementation\
  \ and tests.\n\nM5. Minimal public-data-backed name/synonym/taxonomy sample.\n\n\
  M6. Baseline and hypergraph experiments with ablations.\n\nM7. Formal diagnostic,\
  \ counterexample, or theorem template.\n\nM8. Final synthesis, audit, and contribution\
  \ ledger.\n"
metadata:
  name: Continuous Exploration
  version: '1.0'
  mode: continuous
seed:
  starting_subtopic: null
  starting_tools: null
citations: "<citations>\nWhen referencing external sources (papers, datasets, standards,\n\
  web pages), use numbered brackets [1], [2], etc. Read REFERENCES.md\nat the start\
  \ of your turn to continue the numbering and avoid\nduplicates. Add new references\
  \ to REFERENCES.md using the format:\n  [N] Authors, \"Title,\" Source, Year. URL\
  \ (if applicable).\nIf REFERENCES.md does not exist, create it with your first reference.\n\
  </citations>\n"
