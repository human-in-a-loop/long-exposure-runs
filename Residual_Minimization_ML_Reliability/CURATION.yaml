package_name: "residual_minimization_sciml_reliability"
description: |
  This package contains the final report and curated verification artifacts for a residual-minimization reliability study in scientific machine learning. It includes the broad catalogue, application risk map, theorem and branch notes, toy simulation scripts, tests, CSV outputs, and figures needed to verify the report's claims about when small residual loss does or does not certify physical behavior.
curation_complete: true
include:
  - src: reports/final/final_report.md
    dest: report/final_report.md
    role: report
  - src: MANIFEST.md
    dest: report/MANIFEST.md
    role: report
  - src: REFERENCES.md
    dest: report/REFERENCES.md
    role: report
  - src: residual-certificates/residual_case_catalogue.md
    dest: code/residual-certificates/residual_case_catalogue.md
    role: code
    justification: "Cited in Breadth Of The Catalogue and Mechanism Taxonomy as the 22-mechanism catalogue."
  - src: residual-certificates/application_risk_map.md
    dest: code/residual-certificates/application_risk_map.md
    role: code
    justification: "Cited in Application Risk Map for domain mapping across scientific-ML motifs."
  - src: residual-certificates/broad_synthesis_package.md
    dest: code/residual-certificates/broad_synthesis_package.md
    role: code
    justification: "Cited throughout the report for breadth counts, taxonomy, validation state, and limitations."
  - src: residual-certificates/collocation_blind_spot_theorem.md
    dest: code/residual-certificates/collocation_blind_spot_theorem.md
    role: code
    justification: "Cited in Representative Theorem-Quality Cases And Obstructions for CAT-01."
  - src: residual-certificates/weak_topology_branch.md
    dest: code/residual-certificates/weak_topology_branch.md
    role: code
    justification: "Cited in weak-norm sections for CAT-06 failures and matched elliptic stability baseline."
  - src: residual-certificates/admissibility_invariant_branch.md
    dest: code/residual-certificates/admissibility_invariant_branch.md
    role: code
    justification: "Cited in admissibility and invariant sections for Burgers entropy, positivity, mass, and maximum-principle results."
  - src: residual-certificates/ode_reliability_branch.md
    dest: code/residual-certificates/ode_reliability_branch.md
