# config.yaml

# === Model ===
llm_provider: codex                   # claude | codex | gemini | local (local is an unsupported extension point)
model: opus                          # alias (sonnet, opus, haiku) or full name
codex_model: gpt-5.5                  # used when llm_provider: codex unless agent overrides model
gemini_model: gemini-3-flash-preview  # used when llm_provider: gemini unless agent overrides model
local_model: custom-local-model        # operator-supplied OpenAI-compatible model alias
local_base_url: http://127.0.0.1:18080/v1
local_context_window: 32768           # operator-supplied local context budget
local_max_tokens: 2048
local_recent_log_pct: 0.25            # inject at most 25% of context as recent per-agent transcript
local_compact_max_tokens: 4096        # cap local compaction summaries
local_temperature: 0.2
local_top_p: 0.95
context_window: 1000000
codex_context_window: 400000          # Codex compacts at 90% of this value (360k)
gemini_context_window: 1000000        # Gemini CLI free-tier docs advertise a 1M context window
codex_yolo: true                      # run codex exec --yolo by default (bypass approvals/sandbox like claude -p)
gemini_yolo: true                     # run gemini --yolo by default for autonomous headless turns
gemini_auth_env: GOOGLE_GENAI_USE_GCA # default Google-account / Code Assist auth selector
gemini_auth_value: "true"
codex_subagents:
  max_threads: 5                      # cap concurrent Codex subagent threads
  max_depth: 1                        # direct children only; no recursive subagent trees
model_tier: opus
cli_timeout: 0                       # seconds per claude -p call (0 = no timeout)

# === Compact ===
compact_threshold: 0.90
compact_db: ./data/sessions.db
max_summary_pct: 0.15
depth_compression: gentle

# === Fan-out merge synthesis (Stage 2) ===
# When a parallel_cycle_fanout collapses with >= this many branches, the
# reporter agent is reused at the merge boundary to compress N raw
# merge_reports into one bounded synthesis (~15-30k tokens). This keeps
# the post-merge worker's context bounded as fan-out widens. Below the
# threshold, raw concatenation goes through unchanged (post-merge worker
# can handle 3 reports comfortably).
merge_synthesis_min_branches: 4

# === Agent Teams ===
# When enabled, agents whose score YAML flips `agent_teams: true` get
# CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 in their subprocess env and an
# <agent-teams> guidance block appended to the Operating Protocol section
# of their system prompt. Guidance is inheritance-based: the lead's model,
# effort, and token budget are injected as deterministic values and the
# lead is instructed to pass them verbatim to every teammate.
#
# `enabled: true` activates the feature. Per-agent `agent_teams: true` in
# the score YAML controls which roles can spawn teammates. In the current
# score, only `worker` and `auditor` set the per-agent flag; researcher,
# reporter, curator, and final_reporter run single-threaded.
# Depth is capped at 1 in the template: teammates must not spawn teammates.
agent_teams_defaults:
  enabled: true                            # master on/off (AND with per-agent flag)
  max_teammates: 5                         # hard cap injected into template
  allow_peer_messages: true                # teammates may SendMessage each other to collaborate during a team's lifetime
  cleanup_residue: true                    # Python-side sweep of tasks/<team>/ after each turn
  teammate_response_budget_tokens: 20000   # hard response-length cap passed to each teammate

# === Philosophy ===
philosophy: efficient

# === Framework ===
framework: staged

# === Protocol ===
checkpoint_format: standard
require_checkpoint_first: false
user_gate_approval: false
anti_patterns_enabled: true

# === Permissions ===
# Directory the agent can access (absolute path, scopes file tools).
# File tools (Read, Write, Edit, Glob, Grep) are restricted to this path.
# Bash is NOT path-restricted by this setting — see operating protocol
# for soft directory boundaries enforced via instructions.
# Leave empty for no path restriction. Set to your project dir before
# running a real exploration.
working_directory: "<run-workspace>"

# Command for Wolfram Language scripts. Leave empty if you don't have
# Wolfram installed — agents will be instructed not to use it.
# Use `wolfram-batch` when interactive `wolfram` works but `wolfram -script`
# or `wolframscript` fails in your environment. Set WOLFRAM_BIN if needed.
wolfram_path: "wolfram-batch"

# Tools allowed in non-interactive (-p) mode.
# File tools are automatically scoped to working_directory above.
# Bash accepts optional patterns: "Bash(npm test:npm run build)"
# Set the entire key to "dangerously_skip_all" to bypass all checks (not recommended).

allowed_tools:
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - Bash
  - WebSearch

# === Context Proximity ===
# Pre-ranks past sessions and injects the most relevant as "gems"
# into each agent's system prompt at bootstrap.
context_proximity:
  enabled: true
  max_gems: 7                        # top N sessions to inject
  min_score: 0.3                     # ignore sessions below this score

# Relevance profiles keyed by philosophy name.
# Each profile defines how sessions are scored for that agent type.
# _same_topic / _same_subtopic: matched against the current session's catalog.
# _shared_tools: additive per shared tool.
# _any_topic: base score for all sessions (useful for research agents).
# Named topics/keywords: direct boost or penalty.
relevance_profiles:
  efficient:
    topic_weights:
      _same_topic: 1.0
      _same_subtopic: 0.5
      testing: -0.3
    tool_weights:
      _shared_tools: 0.3
    keyword_weights:
      breaking_change: 0.4
      constraint: 0.3
      silent_failure: 0.3

  research:
    topic_weights:
      _same_topic: 0.8
      _same_subtopic: 0.4
      _any_topic: 0.1
    tool_weights:
      _shared_tools: 0.4
    keyword_weights:
      constraint: 0.5
      rejected_approach: 0.5
      dead_end: 0.4
      surprising: 0.3

  audit:
    topic_weights:
      _same_topic: 1.0
      _same_subtopic: 0.6
    tool_weights:
      _shared_tools: 0.3
    keyword_weights:
      bug: 0.5
      silent_failure: 0.5
      regression: 0.4
      race_condition: 0.4
      breaking_change: 0.3

  reporter:
    topic_weights:
      _same_topic: 1.0
      _same_subtopic: 0.8
      _any_topic: 0.2
    tool_weights:
      _shared_tools: 0.2
    keyword_weights:
      design_decision: 0.5
      constraint: 0.4
      rejected_approach: 0.4
      dead_end: 0.3
      breaking_change: 0.3
      surprising: 0.3
