package_name: "open_alignment_test_factory"
description: |
  This package contains the final report and selected verification artifacts for the Open Alignment Test Factory prototype. It lets a developer inspect the provider-agnostic task schema, benign runtime, deterministic scorers, Inspect adapters, generated evidence summaries, stress probes, tests, figures, and roadmap that support the final conclusions.
curation_complete: true
include:
  - src: reports/final/final_report.md
    dest: report/final_report.md
    role: report
  - src: reports/final/final_report.pdf
    dest: report/final_report.pdf
    role: report
  - src: MANIFEST.md
    dest: report/MANIFEST.md
    role: report
  - src: REFERENCES.md
    dest: report/REFERENCES.md
    role: report
  - src: docs/landscape_gap_map.md
    dest: code/docs/landscape_gap_map.md
    role: code
    justification: "Cited by final_report in Milestone Findings and Comparison to Existing Tools as the landscape gap analysis."
  - src: data/landscape_gap_matrix.csv
    dest: code/data/landscape_gap_matrix.csv
    role: data
    justification: "Cited by final_report Artifact Map as the machine-readable M-1 capability coverage matrix."
  - src: data/landscape_gap_matrix.png
    dest: landscape_gap_matrix.png
    role: figure
    caption: "Heatmap of M-1 landscape capability coverage across alignment testing tools and agentic factory needs; axes are tools versus capability dimensions."
  - src: scripts/plot_landscape_gap_matrix.py
    dest: code/scripts/plot_landscape_gap_matrix.py
    role: code
    justification: "Co-located plot script needed to regenerate figure landscape_gap_matrix.png from the landscape coverage CSV."
  - src: data/failure_taxonomy_priority.png
