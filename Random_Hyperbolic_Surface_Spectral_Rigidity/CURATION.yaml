package_name: "random_hyperbolic_surface_spectral_rigidity"
description: |
  This package contains the final synthesis and verification artifacts for a research campaign on Kim and Tao's eigenvalue rigidity theorem for random hyperbolic covers. It includes the final report, manifest, core scripts cited as Key Files, and all manifest-named figures needed to inspect the proof reconstruction, finite permutation benchmarks, obstruction maps, and surface-facing extension targets.
curation_complete: true
include:
  - src: reports/final/final_report.md
    dest: report/final_report.md
    role: report
  - src: reports/final/final_report.pdf
    dest: report/final_report.pdf
    role: report
  - src: MANIFEST.md
    dest: report/MANIFEST.md
    role: report
  - src: scripts/certify_labelled_embedding_expectation.py
    dest: code/scripts/certify_labelled_embedding_expectation.py
    role: code
    justification: "Cited in final report section First Computational and Formal Probes for the labelled-template expectation identity."
  - src: scripts/analyze_product_ratio_bounds.py
    dest: code/scripts/analyze_product_ratio_bounds.py
    role: code
    justification: "Cited in final report section Product-Ratio Stability and Its Boundary for product-ratio stability and growing-template envelopes."
  - src: scripts/build_local_window_route_synthesis.py
    dest: code/scripts/build_local_window_route_synthesis.py
    role: code
    justification: "Cited in final report section Local Spectral Windows and the Compact-Support Obstruction for the local-window obstruction and branch decision."
  - src: scripts/build_schreier_benchmark_package.py
    dest: code/scripts/build_schreier_benchmark_package.py
    role: code
    justification: "Cited in final report section Standalone Schreier Benchmark Theorem for the theorem package artifact synthesis."
  - src: scripts/analyze_surface_corollary34_numerator_obstruction.py
    dest: code/scripts/analyze_surface_corollary34_numerator_obstruction.py
    role: code
    justification: "Cited in final report section The Corollary 3.4 Numerator Bottleneck for numerator reconstruction and Markov-loss localization."
  - src: scripts/analyze_direct_small_x_surface_numerator_target.py
    dest: code/scripts/analyze_direct_small_x_surface_numerator_target.py
    role: code
    justification: "Cited in final report section The Corollary 3.4 Numerator Bottleneck for the direct small-x target and denominator-loss budget."
  - src: scripts/analyze_signed_pointwise_cancellation_surface_aggregate.py
    dest: code/scripts/analyze_signed_pointwise_cancellation_surface_aggregate.py
    role: code
    justification: "Cited in final report section The Corollary 3.4 Numerator Bottleneck for signed pointwise cancellation classification."
  - src: scripts/analyze_surface_native_grouping_problem.py
    dest: code/scripts/analyze_surface_native_grouping_problem.py
    role: code
    justification: "Cited in final report section Surface-Native Grouping and the Current Pivot for the grouping taxonomy."
  - src: scripts/analyze_surface_relation_kernel_spc_probe.py
    dest: code/scripts/analyze_surface_relation_kernel_spc_probe.py
    role: code
    justification: "Cited in final report section Surface-Native Grouping and the Current Pivot for the kernel-closure signed-cancellation probe and pivot."
  - src: reports/figures/m32_pair_quotient_exponent_map.png
    dest: m32_pair_quotient_exponent_map.png
    role: figure
    caption: "Pair quotient exponent map showing fixed-pair covariance exponent classes for reduced word pairs."
