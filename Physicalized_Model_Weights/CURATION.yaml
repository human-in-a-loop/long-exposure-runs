package_name: "physicalized_model_weights"
description: |
  This package contains the final synthesis and verification artifacts for the physicalized model weights investigation. It lets a reviewer inspect the final report, manifest, references, key executable artifacts, HDL boundary files, and the complete figure set supporting the conclusion that broad fixed frontier-model physicalization is rejected while the safety/filter architecture remains a bounded, non-superiority study.
curation_complete: true
include:
  - src: final_report.md
    dest: report/final_report.md
    role: report
  - src: final_report.pdf
    dest: report/final_report.pdf
    role: report
  - src: MANIFEST.md
    dest: report/MANIFEST.md
    role: report
  - src: REFERENCES.md
    dest: report/REFERENCES.md
    role: report
  - src: physicalized-weights/scripts/breakeven_model.py
